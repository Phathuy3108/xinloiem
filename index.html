<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Em ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
}

/* Nền sao */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 100s linear infinite;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:10000px 5000px;}
}

.card{
    position:relative;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:500px;
    z-index:2;
    box-shadow:0 0 30px rgba(255,0,100,0.5);
}

h1{
    color:#ff4da6;
    margin-bottom:20px;
}

#text{
    min-height:100px;
    margin-bottom:20px;
}

img{
    width:150px;
    border-radius:20px;
    margin:15px 0;
    box-shadow:0 0 20px pink;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.yes{background:#ff4da6;color:white;}
.no{background:#444;color:white;position:absolute;}

button:hover{transform:scale(1.1)}

.heart{
    position:fixed;
    font-size:20px;
    animation: fall 6s linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:1}
    100%{transform:translateY(110vh);opacity:0}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">
    <h1>Xin Lỗi Em ❤️</h1>

    <!-- Thay link ảnh 2 người vào đây -->
    <img src="mylove.jpg">

    <div id="text"></div>

    <button class="yes" onclick="forgive()">Em Tha Lỗi ❤️</button>
    <button class="no" id="noBtn" onmouseover="moveBtn()">Không 😒</button>
</div>

<audio id="music" loop>
    <source src="SAUTATCA.mp3" type="audio/mpeg">
</audio>

<script>
const message = [
"Anh biết anh đã làm em buồn...",
"Và anh thật sự rất hối hận vì điều đó.",
"Anh không cố ý làm tổn thương em,",
"Anh biết lời xin lỗi thôi là chưa đủ.",
"Anh không giỏi nói những lời hoa mỹ…nên lần nữa anh thật lòng xin lỗi em.",
"À không không phải một mà là một nghìn lời xin lỗi từ tận đáy lòng anh gửi đến em...",
"Anh không biết tương lai sẽ ra sao nhưng hiện tại với anh thì một ngày không có em, mọi thứ thật sự không còn ý nghĩa...",
"Anh thật lòng xin lỗi em, em đừng buồn cũng đừng giận anh nữa nhé ❤️"
];

let i=0, j=0;
function typeWriter(){
    if(i < message.length){
        if(j < message[i].length){
            document.getElementById("text").innerHTML += message[i][j];
            j++;
            setTimeout(typeWriter,40);
        }else{
            document.getElementById("text").innerHTML += "<br><br>";
            i++; j=0;
            setTimeout(typeWriter,800);
        }
    }
}
typeWriter();

function moveBtn(){
    const btn=document.getElementById("noBtn");
    btn.style.top=Math.random()*300+"px";
    btn.style.left=Math.random()*300+"px";
}

function forgive(){

    var music = document.getElementById("music");

    setTimeout(() => {

        document.body.innerHTML = `
        <h1 style="text-align:center;margin-top:20%;font-size:50px;">
        Cảm Ơn Em ❤️<br><br>
        Anh hứa sẽ cố gắng hơn và cố gắng không làm em buồn nữa 🌹
        ANH YÊU EM ❤️❤️❤️
        Ngọc Như ❤️
        </h1>
        `;

        // tạo lại audio sau khi đổi body
        var newMusic = new Audio("SAUTATCA.mp3");
        newMusic.loop = true;
        newMusic.play();

        fireworks();
        hearts();

    }, 200);
}

function hearts(){
    setInterval(()=>{
        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),6000);
    },200);
}

function fireworks(){
    setInterval(()=>{
        const fire=document.createElement("div");
        fire.style.position="fixed";
        fire.style.left=Math.random()*100+"vw";
        fire.style.top=Math.random()*100+"vh";
        fire.innerHTML="✨";
        fire.style.fontSize="30px";
        document.body.appendChild(fire);
        setTimeout(()=>fire.remove(),1000);
    },300);
}
</script>

</body>
</html>
